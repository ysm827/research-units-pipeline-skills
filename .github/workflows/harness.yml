name: skill-harness

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install harness dependencies
        run: python -m pip install -e ".[test]"

      - name: Compile scripts and skill helpers
        run: python -m compileall -q scripts tooling .codex/skills

      - name: Run harness tests
        run: python -m pytest -q

      - name: Validate executable pipeline contracts
        run: python scripts/validate_repo.py --no-check-quality --strict

      - name: Audit skills for blocking issues
        run: python scripts/audit_skills.py --fail-on ERROR
