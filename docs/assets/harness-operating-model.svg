<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100" role="img" aria-labelledby="title desc">
  <title id="title">Harness operating model pyramid</title>
  <desc id="desc">A five layer research workflow harness pyramid from capability surface to learning layer, with a right side evidence loop.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #172033; }
      .muted { fill: #526070; }
      .small { font: 500 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 600 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 600 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .line { fill: none; stroke: #64748b; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #64748b; stroke-width: 4; stroke-dasharray: 10 12; stroke-linecap: round; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="1100"/>
  <text class="title ink" x="700" y="90" text-anchor="middle">Research Workflow Harness Operating Model</text>
  <text class="small muted" x="700" y="132" text-anchor="middle">goal -&gt; protocol -&gt; ledger -&gt; evidence -&gt; learning</text>

  <g transform="translate(120 185)">
    <polygon points="420,0 660,0 760,130 320,130" fill="#d9f99d" stroke="#65a30d" stroke-width="4"/>
    <text class="body ink" x="540" y="52" text-anchor="middle">5. Learning Layer</text>
    <text class="small muted" x="540" y="94" text-anchor="middle">ADR, glossary, pattern register, roadmap</text>

    <polygon points="340,155 740,155 850,285 230,285" fill="#ccfbf1" stroke="#0f766e" stroke-width="4"/>
    <text class="body ink" x="540" y="207" text-anchor="middle">4. Evidence Loop</text>
    <text class="small muted" x="540" y="249" text-anchor="middle">doctor, audit, audit-diff, quality gate, manifests</text>

    <polygon points="260,310 820,310 940,440 140,440" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <text class="body ink" x="540" y="362" text-anchor="middle">3. Execution Ledger</text>
    <text class="small muted" x="540" y="404" text-anchor="middle">workspace, UNITS, checkpoints, decisions, outputs</text>

    <polygon points="180,465 900,465 1030,595 50,595" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <text class="body ink" x="540" y="517" text-anchor="middle">2. Workflow Protocol</text>
    <text class="small muted" x="540" y="559" text-anchor="middle">pipeline families, stages, artifacts, success criteria</text>

    <polygon points="100,620 980,620 1120,750 -40,750" fill="#f1f5f9" stroke="#475569" stroke-width="4"/>
    <text class="body ink" x="540" y="672" text-anchor="middle">1. Capability Surface</text>
    <text class="small muted" x="540" y="714" text-anchor="middle">semantic skills, references, deterministic skill scripts</text>
  </g>

  <g>
    <path class="line" d="M 1140 820 C 1280 760 1280 280 1095 250" marker-end="url(#arrow)"/>
    <text class="body ink" x="1185" y="515" transform="rotate(90 1185 515)" text-anchor="middle">learning loop</text>
  </g>

  <g transform="translate(1010 845)">
    <rect class="chip" x="0" y="0" width="260" height="52" rx="8"/>
    <text class="mono muted" x="130" y="34" text-anchor="middle">pipelines/*.md</text>
    <rect class="chip" x="0" y="68" width="260" height="52" rx="8"/>
    <text class="mono muted" x="130" y="102" text-anchor="middle">workspaces/&lt;name&gt;</text>
    <rect class="chip" x="0" y="136" width="260" height="52" rx="8"/>
    <text class="mono muted" x="130" y="170" text-anchor="middle">RUN_AUDIT.json</text>
  </g>

  <path class="dash" d="M 995 870 C 930 785 900 625 840 575"/>
  <path class="dash" d="M 1000 940 C 895 880 800 520 800 430"/>
  <path class="dash" d="M 1000 1008 C 860 940 760 370 740 275"/>
</svg>
