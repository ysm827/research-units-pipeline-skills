<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Harness Showcase Lineage</title>
  <desc id="desc">Deliverable-first comparison of the research-brief and source-tutorial showcase fixtures.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef5f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b45309"/>
    </marker>
    <style>
      .title { font: 800 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .lane-title { font: 800 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .lane-subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .phase { font: 750 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; letter-spacing: 0.5px; }
      .box-title { font: 750 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .box-text { font: 500 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .foot { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1600" fill="url(#bg)"/>

  <text x="70" y="70" class="title">Harness Showcase Lineage</text>
  <text x="70" y="105" class="subtitle">Start from reader-facing deliverables, then trace backward through artifacts, protocols, and evidence.</text>

  <g transform="translate(70 145)">
    <rect x="0" y="0" width="1260" height="280" rx="18" fill="#ffffff" stroke="#99f6e4" stroke-width="2" filter="url(#shadow)"/>
    <text x="32" y="44" class="lane-title">Research-Brief Fixture</text>
    <text x="32" y="70" class="lane-subtitle">Compact lineage for fast topic understanding and reading-path generation</text>

    <text x="60" y="116" class="phase">FINAL PRODUCT</text>
    <text x="320" y="116" class="phase">REASONING ARTIFACTS</text>
    <text x="610" y="116" class="phase">EVIDENCE + PROTOCOL</text>

    <g>
      <rect x="38" y="138" width="230" height="86" rx="12" fill="#ecfeff" stroke="#0f766e" stroke-width="2"/>
      <text x="58" y="169" class="box-title">Brief Snapshot</text>
      <text x="58" y="196" class="box-text">output/SNAPSHOT.md</text>
    </g>
    <line x1="278" y1="181" x2="316" y2="181" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <g>
      <rect x="326" y="138" width="250" height="86" rx="12" fill="#f0fdfa" stroke="#14b8a6" stroke-width="2"/>
      <text x="346" y="169" class="box-title">Outline + Taxonomy</text>
      <text x="346" y="196" class="box-text">outline/*.yml, core_set</text>
    </g>
    <line x1="586" y1="181" x2="620" y2="181" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <g>
      <rect x="630" y="138" width="330" height="86" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
      <text x="650" y="169" class="box-title">Self-Check + Protocol</text>
      <text x="650" y="196" class="box-text">CONTRACT + research-brief</text>
    </g>

    <text x="38" y="255" class="small">Tracked fixture: example/research-brief/rag-evaluation-harness-demo/</text>
  </g>

  <g transform="translate(70 470)">
    <rect x="0" y="0" width="1260" height="310" rx="18" fill="#ffffff" stroke="#fed7aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="32" y="44" class="lane-title">Source-Tutorial Fixture</text>
    <text x="32" y="70" class="lane-subtitle">Richer delivery lineage for source-grounded tutorial, article PDF, and Beamer slides</text>

    <text x="60" y="116" class="phase">FINAL PRODUCT</text>
    <text x="300" y="116" class="phase">PEDAGOGICAL STRUCTURE</text>
    <text x="590" y="116" class="phase">DELIVERY EVIDENCE + PROTOCOL</text>

    <g>
      <rect x="38" y="138" width="224" height="106" rx="12" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
      <text x="58" y="170" class="box-title">Tutorial Excerpt</text>
      <text x="58" y="197" class="box-text">output/TUTORIAL_</text>
      <text x="58" y="215" class="box-text">EXCERPT.md</text>
    </g>
    <line x1="272" y1="191" x2="294" y2="191" stroke="#b45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
    <g>
      <rect x="304" y="138" width="250" height="106" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
      <text x="324" y="170" class="box-title">Spec + Module Plan</text>
      <text x="324" y="197" class="box-text">TUTORIAL_SPEC,</text>
      <text x="324" y="215" class="box-text">module_plan.yml</text>
    </g>
    <line x1="564" y1="191" x2="586" y2="191" stroke="#b45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
    <g>
      <rect x="596" y="138" width="390" height="106" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
      <text x="616" y="170" class="box-title">Self-Check + Delivery</text>
      <text x="616" y="197" class="box-text">PDF evidence, contract, audit</text>
      <text x="616" y="215" class="box-text">source-tutorial protocol</text>
    </g>

    <text x="38" y="276" class="small">Tracked fixture: example/source-tutorial/robot-learning-harness-demo/</text>
  </g>

  <g transform="translate(70 810)">
    <rect x="0" y="-22" width="1460" height="42" rx="12" fill="#e2e8f0" opacity="0.9"/>
    <text x="24" y="5" class="foot">Showcase contract: every visual node maps to a tracked fixture file or a current pipeline contract; live workspaces remain under workspaces/&lt;name&gt;/.</text>
  </g>
</svg>
