<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400" role="img" aria-labelledby="title desc">
  <title id="title">research-units-pipeline-skills runtime system map</title>
  <desc id="desc">A faithful map of the current research workflow harness using Capability Surface, Workflow Protocol, Execution Ledger, Evidence Loop, and Learning Layer.</desc>
  <defs>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 800 38px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .layer-title { font: 800 25px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 560 17px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 540 14px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 650 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #172033; }
      .cap { fill: #f1f5f9; stroke: #475569; stroke-width: 3; }
      .proto { fill: #fef3c7; stroke: #d97706; stroke-width: 3; }
      .ledger { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .evidence { fill: #ccfbf1; stroke: #0f766e; stroke-width: 3; }
      .learning { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .arrow { fill: none; stroke: #64748b; stroke-width: 4; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .loop { fill: none; stroke: #334155; stroke-width: 4; stroke-dasharray: 10 10; marker-end: url(#arrow-dark); stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #94a3b8; stroke-width: 3; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-dark" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="page" width="1400" height="1400"/>
  <text class="title" x="70" y="70">research-units-pipeline-skills: runtime harness map</text>
  <text class="subtitle" x="70" y="105">Same operating model as the pyramid, mapped to current repo files and commands.</text>

  <rect class="chip" x="70" y="155" width="230" height="74" rx="12"/>
  <text class="layer-title" x="94" y="190">User Goal</text>
  <text class="small" x="94" y="215">prompt or CLI topic</text>

  <rect class="cap" x="70" y="300" width="235" height="420" rx="18"/>
  <text class="layer-title" x="96" y="340">1. Capability Surface</text>
  <text class="body" x="96" y="382">Semantic judgment and</text>
  <text class="body" x="96" y="407">deterministic helpers</text>
  <rect class="chip" x="96" y="450" width="180" height="48" rx="8"/>
  <text class="mono" x="186" y="480" text-anchor="middle">.codex/skills/</text>
  <rect class="chip" x="96" y="516" width="180" height="48" rx="8"/>
  <text class="mono" x="186" y="546" text-anchor="middle">references/</text>
  <rect class="chip" x="96" y="582" width="180" height="48" rx="8"/>
  <text class="mono" x="186" y="612" text-anchor="middle">skill scripts</text>
  <text class="small" x="96" y="675">Guardrails, acceptance,</text>
  <text class="small" x="96" y="699">examples, rubrics</text>

  <rect class="proto" x="360" y="220" width="250" height="520" rx="18"/>
  <text class="layer-title" x="388" y="260">2. Workflow Protocol</text>
  <text class="body" x="388" y="302">Constrained task shape</text>
  <rect class="chip" x="388" y="345" width="194" height="48" rx="8"/>
  <text class="mono" x="485" y="375" text-anchor="middle">README + taxonomy</text>
  <rect class="chip" x="388" y="411" width="194" height="48" rx="8"/>
  <text class="mono" x="485" y="441" text-anchor="middle">pipelines/*.md</text>
  <rect class="chip" x="388" y="477" width="194" height="48" rx="8"/>
  <text class="mono" x="485" y="507" text-anchor="middle">UNITS templates</text>
  <text class="small" x="388" y="572">Stages, target artifacts,</text>
  <text class="small" x="388" y="596">checkpoints, success criteria</text>
  <text class="small" x="388" y="650">7 executable protocols;</text>
  <text class="small" x="388" y="674">graduate-paper guided</text>

  <rect class="ledger" x="665" y="220" width="255" height="520" rx="18"/>
  <text class="layer-title" x="693" y="260">3. Execution Ledger</text>
  <text class="body" x="693" y="302">Durable per-run state</text>
  <rect class="chip" x="693" y="345" width="199" height="48" rx="8"/>
  <text class="mono" x="792" y="375" text-anchor="middle">workspaces/&lt;name&gt;</text>
  <rect class="chip" x="693" y="411" width="199" height="48" rx="8"/>
  <text class="mono" x="792" y="441" text-anchor="middle">PIPELINE.lock.md</text>
  <rect class="chip" x="693" y="477" width="199" height="48" rx="8"/>
  <text class="mono" x="792" y="507" text-anchor="middle">UNITS.csv</text>
  <rect class="chip" x="693" y="543" width="199" height="48" rx="8"/>
  <text class="mono" x="792" y="573" text-anchor="middle">STATUS + DECISIONS</text>
  <text class="small" x="693" y="650">Outputs, reports, logs,</text>
  <text class="small" x="693" y="674">manifests, checkpoints</text>

  <rect class="evidence" x="975" y="220" width="255" height="520" rx="18"/>
  <text class="layer-title" x="1003" y="260">4. Evidence Loop</text>
  <text class="body" x="1003" y="302">Run health and repair</text>
  <rect class="chip" x="1003" y="345" width="199" height="48" rx="8"/>
  <text class="mono" x="1102" y="375" text-anchor="middle">doctor</text>
  <rect class="chip" x="1003" y="411" width="199" height="48" rx="8"/>
  <text class="mono" x="1102" y="441" text-anchor="middle">audit + audit-diff</text>
  <rect class="chip" x="1003" y="477" width="199" height="48" rx="8"/>
  <text class="mono" x="1102" y="507" text-anchor="middle">quality gate</text>
  <rect class="chip" x="1003" y="543" width="199" height="48" rx="8"/>
  <text class="mono" x="1102" y="573" text-anchor="middle">JSON sidecars</text>
  <text class="small" x="1003" y="650">Typed issues, manifests,</text>
  <text class="small" x="1003" y="674">comparison, CI checks</text>

  <rect class="learning" x="360" y="840" width="870" height="150" rx="18"/>
  <text class="layer-title" x="390" y="880">5. Learning Layer</text>
  <text class="body" x="390" y="918">Repeated evidence becomes repo memory and future constraints.</text>
  <rect class="chip" x="390" y="940" width="155" height="38" rx="8"/>
  <text class="mono" x="467" y="965" text-anchor="middle">PROJECT_LANGUAGE</text>
  <rect class="chip" x="565" y="940" width="120" height="38" rx="8"/>
  <text class="mono" x="625" y="965" text-anchor="middle">docs/adr</text>
  <rect class="chip" x="705" y="940" width="170" height="38" rx="8"/>
  <text class="mono" x="790" y="965" text-anchor="middle">PATTERN_REGISTER</text>
  <rect class="chip" x="895" y="940" width="120" height="38" rx="8"/>
  <text class="mono" x="955" y="965" text-anchor="middle">ROADMAP</text>
  <rect class="chip" x="1035" y="940" width="165" height="38" rx="8"/>
  <text class="mono" x="1117" y="965" text-anchor="middle">validate_repo.py</text>

  <path class="arrow" d="M300 192 H360"/>
  <path class="arrow" d="M305 500 H360"/>
  <path class="arrow" d="M610 500 H665"/>
  <path class="arrow" d="M920 500 H975"/>
  <path class="arrow" d="M1102 740 V840"/>
  <path class="loop" d="M795 840 C735 790 625 760 500 740"/>
  <path class="loop" d="M795 840 C705 740 535 700 305 635"/>
  <path class="loop" d="M795 840 C900 790 1000 760 1102 740"/>
  <path class="thin" d="M485 740 V840"/>
  <path class="thin" d="M792 740 V840"/>

  <text class="small" x="70" y="1042">Boundary: kickoff routing hints are not a full autonomous planner. Future auto-research needs policy, semantic evaluator, representative benchmark corpus, and explicit memory-promotion rules.</text>
</svg>
