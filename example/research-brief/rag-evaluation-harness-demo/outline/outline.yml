title: RAG Evaluation Research Brief
sections:
  - id: scope
    title: Scope
    bullets:
      - RAG quality should be measured across retrieval, grounding, and final task utility.
      - The brief focuses on evaluation design rather than model architecture.
      - The main reader is a newcomer choosing what to measure first.
  - id: axes
    title: Evaluation Axes
    bullets:
      - Retrieval coverage asks whether the system found useful evidence.
      - Grounding asks whether answer claims are supported by retrieved material.
      - Utility asks whether the final answer solved the user's problem.
      - Robustness asks whether conclusions survive paraphrase, distractors, and corpus drift.
  - id: harness
    title: Harness Implication
    bullets:
      - The workflow should retain intermediate artifacts, not only final scores.
      - Audit reports should expose missing evidence and incomplete target artifacts.
      - Repeated failure classes should feed back into reusable rubrics and validation.
