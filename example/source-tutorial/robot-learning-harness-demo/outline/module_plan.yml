modules:
  - module_id: M1
    title: The Interaction Loop
    objectives:
      - Explain the agent-environment loop in reinforcement learning.
      - Describe why delayed rewards make learning iterative.
    outputs:
      - Plain-language explanation of state, action, reward, and return.
    exercise:
      prompt: Explain why trial-and-error is needed when rewards are delayed.
      verification: Mentions both environment feedback and delayed reward.
  - module_id: M2
    title: Robot Learning Tooling
    objectives:
      - Explain how robot-learning tutorials connect concepts to training stacks.
      - Identify the role of datasets, repository docs, and workflows in practice.
    outputs:
      - Walkthrough of how a robot-learning repo bridges concept and code.
    exercise:
      prompt: Name two things a robotics repo/doc stack adds beyond a theory-only RL introduction.
      verification: Includes at least two repo/doc-specific items.
  - module_id: M3
    title: Representation Bias In Robot Learning
    objectives:
      - Explain why symmetry-aware structure matters in robotics.
      - Use SE(3)-equivariance as an advanced but bounded example.
    outputs:
      - Explanation of why equivariance can improve efficiency and generalization.
    exercise:
      prompt: Explain why geometry-aware inductive bias matters in manipulation tasks.
      verification: Mentions geometry or symmetry and either efficiency or generalization.
